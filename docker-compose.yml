services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: mini_notion
      POSTGRES_PASSWORD: mini_notion
      POSTGRES_DB: mini_notion
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/docker/init-test-db.sql:/docker-entrypoint-initdb.d/02-mini-notion-test.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mini_notion -d mini_notion']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
